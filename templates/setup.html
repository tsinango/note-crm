{% extends "base.html" %}
{% block title %}Create admin{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="text-center mb-4">
        <i class="bi bi-shield-lock display-1 text-primary"></i>
        <h2 class="mt-2">First run - create admin</h2>
        <p class="text-muted">No users exist yet. Create the first admin account.</p>
      </div>
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form method="POST">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control" id="username" name="username" required autofocus minlength="2">
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
            </div>
            <div class="mb-3">
              <label for="password2" class="form-label">Confirm password</label>
              <input type="password" class="form-control" id="password2" name="password2" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-person-plus"></i> Create admin
            </button>
          </form>
        </div>
      </div>
      <p class="text-muted text-center mt-3 small">
        You can also create it with environment variables:<br>
        <code>ADMIN_USERNAME=admin ADMIN_PASSWORD=xxx python3 app.py</code>
      </p>
    </div>
  </div>
</div>
{% endblock %}
