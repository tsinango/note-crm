{% extends "base.html" %}
{% block title %}初始化管理员{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="text-center mb-4">
        <i class="bi bi-shield-lock display-1 text-primary"></i>
        <h2 class="mt-2">首次使用 — 创建管理员</h2>
        <p class="text-muted">系统中还没有用户，请创建第一个管理员账号</p>
      </div>
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form method="POST">
            <div class="mb-3">
              <label for="username" class="form-label">用户名</label>
              <input type="text" class="form-control" id="username" name="username" required autofocus minlength="2">
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">密码</label>
              <input type="password" class="form-control" id="password" name="password" required minlength="6" placeholder="至少 6 个字符">
            </div>
            <div class="mb-3">
              <label for="password2" class="form-label">确认密码</label>
              <input type="password" class="form-control" id="password2" name="password2" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary w-100">
              <i class="bi bi-person-plus"></i> 创建管理员
            </button>
          </form>
        </div>
      </div>
      <p class="text-muted text-center mt-3 small">
        也可以通过环境变量创建：<br>
        <code>ADMIN_USERNAME=admin ADMIN_PASSWORD=xxx python3 app.py</code>
      </p>
    </div>
  </div>
</div>
{% endblock %}
